name: regi_chat
description: "RegiMenu chat input/output widgets with Auth0 + voice"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  auth0_flutter: ^1.5.0
  http: ^1.2.0
  speech_to_text: ^7.0.0
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.3.0
  flutter_dotenv: ^5.2.0
  provider: ^6.1.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/ptt_fingerprint.png
