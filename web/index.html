<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="RegiMenu chat input/output widgets with Auth0 + voice">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="RegiMenu">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>RegiMenu Chat</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Auth0 SPA SDK — required by `auth0_flutter` on the web platform.
    Make sure these URLs are configured in the Auth0 dashboard for the SPA app:
      - Allowed Callback URLs:   http://localhost:5000, https://<netlify-domain>
      - Allowed Logout URLs:     http://localhost:5000, https://<netlify-domain>
      - Allowed Web Origins:     http://localhost:5000, https://<netlify-domain>
  -->
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // PWA auto-update: when a new service worker version is installed,
    // immediately reload so the user gets the latest bundle on next open
    // without having to swipe-close the app. Without this, an installed
    // PWA can sit on a stale cached bundle for days.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(function (reg) {
        reg.addEventListener('updatefound', function () {
          var nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', function () {
            // 'installed' + an existing controller means: a new SW is ready
            // and the user already has the old one running. Reload to swap.
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              window.location.reload();
            }
          });
        });
      });
    }
  </script>
</body>
</html>
