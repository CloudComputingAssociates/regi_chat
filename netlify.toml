[build]
  # `.env` is gitignored and not present in the Netlify build env, but
  # pubspec.yaml declares it as an asset (needed for flutter_dotenv to work
  # in local dev). Touch an empty .env so the build doesn't fail; real
  # config is injected via --dart-define and read by lib/config.dart.
  command = """
    touch .env && \
    git clone https://github.com/flutter/flutter.git --depth 1 -b stable _flutter && \
    export PATH="$PATH:$(pwd)/_flutter/bin" && \
    flutter pub get && \
    flutter build web --release \
      --dart-define=AUTH0_DOMAIN=$AUTH0_DOMAIN \
      --dart-define=AUTH0_CLIENT_ID=$AUTH0_CLIENT_ID \
      --dart-define=AUTH0_AUDIENCE=$AUTH0_AUDIENCE \
      --dart-define=API_BASE_URL=$API_BASE_URL
  """
  publish = "build/web"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
